<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>التخليص الجمركي - Portiva</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}

/* الخلفية نفس الهيرو */
body{
color:#fff;
background:
linear-gradient(rgba(0,0,0,.65),rgba(0,0,0,.75)),
url('hero-final.jpg') center/cover no-repeat fixed;
min-height:100vh;
}

/* نافبار زي الرئيسية */
nav{
position:fixed;top:0;right:0;left:0;
display:flex;justify-content:space-between;align-items:center;
padding:14px 40px;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
z-index:1000
}
nav .links a{
color:#fff;text-decoration:none;margin:0 10px;font-size:14px;opacity:.9
}
nav .links a:hover{opacity:1}
.logo{font-weight:700;letter-spacing:1px}

/* محتوى الصفحة */
.wrap{
display:flex;align-items:center;justify-content:center;
min-height:100vh;padding:120px 20px 40px
}

.card{
width:100%;max-width:420px;text-align:center;
background:rgba(10,25,50,.65);
border-radius:22px;padding:40px 28px;
box-shadow:0 10px 40px rgba(0,0,0,.4);
backdrop-filter:blur(8px);
border:1px solid rgba(255,255,255,.08)
}

/* الأيقونة (نفس ستايل الأزرق) */
.icon{
width:80px;height:80px;border-radius:50%;
display:flex;align-items:center;justify-content:center;
margin:0 auto 18px;
background:radial-gradient(circle at 30% 30%, #4aa3ff, #0d6efd);
box-shadow:0 10px 25px rgba(13,110,253,.45)
}
.icon i{font-size:34px;color:#fff}

h1{font-size:26px;margin-bottom:10px}
.desc{opacity:.95;line-height:1.7;margin-bottom:14px}

.list{font-size:14px;line-height:1.8;opacity:.9;margin-bottom:18px}

/* زرار */
.btn{
display:inline-block;margin-top:6px;
padding:12px 26px;border-radius:28px;
background:linear-gradient(90deg,#4aa3ff,#0d6efd);
color:#fff;text-decoration:none;font-weight:600;
box-shadow:0 10px 20px rgba(13,110,253,.4);
transition:.25s
}
.btn:hover{transform:translateY(-2px)}

.back{
display:block;margin-top:14px;color:#ddd;text-decoration:none;font-size:13px;opacity:.85
}
.back:hover{opacity:1}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="links">
    <a href="index.html">الرئيسية</a>
    <a href="index.html#services">خدماتنا</a>
    <a href="index.html#work">أعمالنا</a>
    <a href="index.html#form">طلب عرض سعر</a>
  </div>
  <div class="logo">PORTIVA</div>
</nav>

<!-- CONTENT -->
<section class="wrap">
  <div class="card">

    <div class="icon">
      <i class="fa-solid fa-ship"></i>
    </div>

    <h1>التخليص الجمركي</h1>

    <p class="desc">
      نقدم خدمات التخليص الجمركي (صادر / وارد) بسرعة واحترافية من جميع الموانئ.
    </p>

    <div class="list">
      ✔ إنهاء جميع الإجراءات<br>
      ✔ تقليل وقت الإفراج<br>
      ✔ متابعة كاملة للشحنة
    </div>

    <a class="btn" target="_blank"
       href="https://wa.me/201204646350?text=استفسار عن التخليص الجمركي">
      تواصل واتساب
    </a>

    <a class="back" href="index.html">رجوع للرئيسية</a>

  </div>
</section>

</body>
</html>
